# .github/workflows/deploy-backend.yml
name: Build and Push Backend Docker Image

on:
  push:
    branches:
      - main
    paths:
      # Only trigger workflow when backend files are modified
      - "apps/back-end/**"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # Required to publish packages to GHCR

    steps:
      # Check out the Fuyeor Reference Repository (This current repo)
      - name: Checkout Reference Repository
        uses: actions/checkout@v4
        with:
          path: reference

      # Convert repository name to lowercase (fuyeor/reference-back)
      - name: Lowercase Repository Name
        run: |
          RAW_NAME="${{ github.repository }}-back"
          echo "IMAGE_NAME=${RAW_NAME,,}" >> ${GITHUB_ENV}

      # Setup Docker Buildx for advanced caching features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.FUYEOR_DEPLOY_TOKEN }}

      # Build and PUSH the backend imag
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./reference
          file: ./reference/Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest # Tagged as ghcr.io/fuyeor/reference-back:latest
